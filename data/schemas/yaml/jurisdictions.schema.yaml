last_updated: '2026-07-18'
update_frequency: Static
fields:
- name: id
  type: BIGINT
  nullable: false
  metadata:
    description: Surrogate primary key
    constraint: PRIMARY_KEY
- name: jur_code
  type: VARCHAR(3)
  nullable: false
  metadata:
    description: ISO 3166-1 alpha-3 code
    constraint: UNIQUE
- name: name
  type: VARCHAR
  nullable: false
  metadata:
    description: Jurisdiction name
- name: region
  type: VARCHAR
  nullable: true
