domain_key: scsm
table_name: subnational_overlays
table_type: fact
type: struct
version: '1.0'
schema_category: field_metadata
architectural_role: epistemic_pluralism_layer
storage_format: table
description: Sub-national customary/tenure overlap risk data.
last_updated: '2026-07-18'
update_frequency: Batch
fields:
- name: id
  type: BIGINT
  nullable: false
  metadata:
    description: Surrogate primary key
    constraint: PRIMARY_KEY
- name: jurisdiction_id
  type: BIGINT
  nullable: false
  metadata:
    description: Foreign key to jurisdictions
- name: source_id
  type: BIGINT
  nullable: false
  metadata:
    description: Foreign key to sources
- name: region
  type: VARCHAR
  nullable: false
  metadata:
    description: Sub-national identifier
- name: overlap_risk
  type: DECIMAL(4,2)
  nullable: false
  metadata:
    description: Overlap risk score (0-10)
    constraint: CHECK (overlap_risk BETWEEN 0 AND 10)
- name: as_of_date
  type: DATE
  nullable: false
  metadata:
    description: Date of score validity
